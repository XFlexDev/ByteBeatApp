name: Build App
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Xcode Project
        run: xcodegen generate
      - name: Build Device Version
        run: |
          xcodebuild -project Bytebeat.xcodeproj \
            -scheme Bytebeat \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            CONFIGURATION_BUILD_DIR=build-device \
            clean build
          mkdir -p build-device/Payload
          cp -r build-device/Bytebeat.app build-device/Payload/
          cd build-device && zip -r Bytebeat-Device.ipa Payload && cd ..
      - name: Build Simulator Version
        run: |
          xcodebuild -project Bytebeat.xcodeproj \
            -scheme Bytebeat \
            -configuration Release \
            -sdk iphonesimulator \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            CONFIGURATION_BUILD_DIR=build-sim \
            clean build
          cd build-sim && zip -r Bytebeat-Simulator.zip Bytebeat.app && cd ..
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Bytebeat-Builds
          path: |
            build-device/Bytebeat-Device.ipa
            build-sim/Bytebeat-Simulator.zip
