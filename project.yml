name: Bytebeat
options:
  bundleIdPrefix: com.kreatix
targets:
  Bytebeat:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - path: BytebeatApp.swift
      - path: ContentView.swift
      - path: BytebeatEvaluator.swift
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.kreatix.bytebeat
      MARKETING_VERSION: 1.0.0
      CURRENT_PROJECT_VERSION: 1
      GENERATE_INFOPLIST_FILE: YES
